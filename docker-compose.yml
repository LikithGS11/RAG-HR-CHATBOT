services:
  backend:
    build: .
    command: python app/backend/app.py
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - APP_API_KEY=${APP_API_KEY:-}
      - FLASK_DEBUG=false

  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
